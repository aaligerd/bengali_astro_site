name: Deploy bengali astro site to production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via ssh
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.SSH_HOST }}
          username: root 
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/projects/astro_site/bengali_astro_site
            git pull
            docker compose up -d --build

