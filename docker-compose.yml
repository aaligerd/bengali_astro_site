services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5050:5050"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5050
    # If your Postgres is running on the VPS host (localhost) and you want to connect using localhost:
    # network_mode: "host"
    
    # Or, if you prefer the default bridge network, use the host gateway mapping:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    restart: always
